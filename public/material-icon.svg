<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <!-- Orange background -->
  <rect width="400" height="260" rx="20" fill="#e2520a"/>

  <!-- Hammer -->
  <g transform="translate(200,130) rotate(-35)">
    <!-- Handle -->
    <rect x="-10" y="10" width="20" height="90" rx="6" fill="white" opacity="0.95"/>
    <!-- Head body -->
    <rect x="-28" y="-42" width="56" height="58" rx="8" fill="white" opacity="0.95"/>
    <!-- Claw (back of head) -->
    <rect x="-38" y="-42" width="14" height="36" rx="5" fill="white" opacity="0.85"/>
  </g>
</svg>
